app = "chinhnt-portfolio-platform"
primary_region = "sin"  # Singapore — gần VN nhất

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

# Persistent SQLite database file lives here (survives deploys/restarts).
[mounts]
  source = "portfolio_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"    # Không tự tắt → luôn awake (no cold start)
  auto_start_machines = true    # Tự bật khi có request (fallback)
  min_machines_running = 1      # Luôn giữ 1 machine chạy 24/7

  [[http_service.checks]]
    grace_period = "2m"
    interval = "15s"
    method = "GET"
    path = "/actuator/health"
    timeout = "10s"

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
