name: Deploy Platform BE

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    outputs:
      deployed_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/portfolio-repo/portfolio-platform:latest
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: portfolio-platform
          region: asia-southeast1
          image: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/portfolio-repo/portfolio-platform:latest
          flags: --allow-unauthenticated
          env_vars: >-
            SPRING_PROFILES_ACTIVE=prod,
            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }},
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }},
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }},
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }},
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}

      - name: Upload deployed URL artifact
        run: echo "${{ steps.deploy.outputs.url }}" > deployed_url.txt

      - name: Upload deployed URL artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployed-url
          path: deployed_url.txt
          retention-days: 1

  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy
    steps:
      - name: Download deployed URL
        uses: actions/download-artifact@v4
        with:
          name: deployed-url

      - name: Read deployed URL
        id: read_url
        run: echo "url=$(cat deployed_url.txt)" >> $GITHUB_OUTPUT

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run REST smoke tests
        run: npm run smoke:test -- --testPathPattern=rest
        continue-on-error: false
        env:
          DEPLOYED_BE_URL: ${{ needs.deploy.outputs.deployed_url }}
          SMOKE_TEST_ADMIN_TOKEN: ${{ secrets.SMOKE_TEST_ADMIN_TOKEN }}

      - name: Run WebSocket smoke tests
        run: npm run smoke:test -- --testPathPattern=websocket
        continue-on-error: false
        env:
          DEPLOYED_BE_URL: ${{ needs.deploy.outputs.deployed_url }}

      - name: Report smoke test failure
        if: failure()
        run: |
          echo "=========================================="
          echo "SMOKE TEST FAILURE — CI GATE FAILED"
          echo "=========================================="
          echo "Workflow : Deploy Platform BE"
          echo "Run ID   : ${{ github.run_id }}"
          echo "URL      : ${{ needs.deploy.outputs.deployed_url }}"
          echo ""
          echo "One or more smoke tests failed. The deploy is flagged as requiring investigation."
          echo "No automatic rollback is performed. Manual intervention may be required."
          exit 1
