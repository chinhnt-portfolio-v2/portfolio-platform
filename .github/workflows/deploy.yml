name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: portfolio-v2-489714
  REGION: asia-southeast1
  SERVICE_NAME: portfolio-platform

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: asia-southeast1-docker.pkg.dev/${{ env.PROJECT_ID }}/github-actions/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/github-actions/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Deploy to Cloud Run
        run: |
          SERVICE_ACCOUNT_KEY='${{ secrets.GCP_CREDENTIALS }}'
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/github-actions/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.run_number }}"

          echo "Deploying image: $IMAGE"
          docker run \
            --rm \
            --tty \
            --volume=$(pwd):/app \
            --workdir=/app \
            google/cloud-sdk:slim \
            bash -c "
              echo $SERVICE_ACCOUNT_KEY | base64 -d > /tmp/sa.json
              gcloud auth activate-service-account --key-file=/tmp/sa.json
              gcloud run deploy ${{ env.SERVICE_NAME }} \
                --image=$IMAGE \
                --region=${{ env.REGION }} \
                --platform=managed \
                --allow-unauthenticated \
                --set-env-vars=SPRING_PROFILES_ACTIVE=prod \
                --set-secrets=NEON_DATABASE_URL=neon-database:latest \
                --add-cloudsql-instances=${{ vars.CLOUDSQL_INSTANCE }} \
                --service-account=${{ vars.CLOUD_RUN_SA }}
            "

      - name: Verify Deployment
        run: |
          sleep 10
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format="value(status.url)")
          echo "Service URL: $URL"
          curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/health"
