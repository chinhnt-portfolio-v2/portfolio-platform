name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: portfolio-v2-489714
  REGION: asia-southeast1
  SERVICE_NAME: portfolio-platform
  IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/github-actions/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ env.IMAGE }}:${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.run_number }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Thêm permissions để deploy
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Deploy to Cloud Run
        run: |
          echo "Deploying ${{ needs.build-and-push.outputs.image }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ needs.build-and-push.outputs.image }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars=SPRING_PROFILES_ACTIVE=prod \
            --set-secrets=NEON_DATABASE_URL=neon-database:latest \
            --service-account=${{ vars.CLOUD_RUN_SA }}

      - name: Verify Deployment
        run: |
          sleep 15
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format="value(status.url)")
          echo "Deployed to: $URL"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/health")
          echo "Health check: $HTTP_CODE"
