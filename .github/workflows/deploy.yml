name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: portfolio-v2-489714
      REGION: asia-southeast1
      SERVICE_NAME: portfolio-platform
      REGISTRY: asia-southeast1-docker.pkg.dev/portfolio-v2-489714/github-actions
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.run_number }} \
            --tag=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest \
            --build-arg GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            --build-arg GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            .

      - name: Push Docker images
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.run_number }}
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: 'write'
      contents: 'read'
    env:
      PROJECT_ID: portfolio-v2-489714
      REGION: asia-southeast1
      SERVICE_NAME: portfolio-platform
    steps:
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ needs.build-and-push.outputs.image }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars=SPRING_PROFILES_ACTIVE=prod \
            --set-secrets=NEON_DATABASE_URL=neon-database:latest

      - name: Verify Deployment
        run: |
          sleep 15
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format="value(status.url)")
          echo "Deployed to: $URL"
