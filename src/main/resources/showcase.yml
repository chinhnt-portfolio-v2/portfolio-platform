# Platform BE Demo App Registry
# ─────────────────────────────────────────────────────────────────────────────
# Register demo apps for health polling here.
# Edit this file to add or remove apps — then restart BE to apply changes.
#
# Schema:
#   slug            — unique identifier; MUST match project slug in FE projects.ts
#   name            — display name for logging and admin UI
#   healthEndpoint  — URL polled every 60s by MetricsAggregationService
#   demoUrl         — optional; used for admin display only
#
# Behavior:
#   ✓ Valid entry  → BE polls healthEndpoint on next restart
#   ✓ Entry removed → BE stops polling; orphan project_health record expires via Story 3.5
#   ✗ Malformed YAML → application refuses to start (fail-fast)
# ─────────────────────────────────────────────────────────────────────────────
apps:
  - slug: wallet-app
    name: "Wallet App"
    healthEndpoint: "https://wallet.chinh.dev/health"
    demoUrl: "https://wallet.chinh.dev"
  - slug: portfolio-v2
    name: "Portfolio v2"
    healthEndpoint: "https://portfolio-v2.vercel.app/"
  # ── Adding a new app ────────────────────────────────────────────────────
  # Uncomment and fill the template below, then restart BE.
  #
  # - slug: my-new-app
  #   name: "My New App"
  #   healthEndpoint: "https://myapp.chinh.dev/health"
  #   demoUrl: "https://myapp.chinh.dev"
