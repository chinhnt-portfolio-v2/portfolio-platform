spring:
  application:
    name: portfolio-platform
  profiles:
    active: local  # default for development; override with SPRING_PROFILES_ACTIVE=prod in production
  config:
    import: optional:classpath:showcase.yml

  jpa:
    hibernate:
      ddl-auto: none      # Turso/SQLite: schema applied out-of-band; Hibernate validate is too strict on SQLite affinity
    open-in-view: false   # Prevent lazy-loading anti-pattern in REST layer
    database-platform: org.hibernate.community.dialect.SQLiteDialect

  # Flyway owns the schema again (xerial SQLite IS Flyway-detectable, unlike the libSQL HTTP driver).
  # On a fresh DB file (e.g. a new Fly volume) Flyway applies the consolidated baseline
  # db/migration/V1__init_schema.sql automatically on boot.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=3600s  # 1h TTL for GitHub API cache

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /api-docs
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never  # Do not expose DB health details publicly

---
# ─────────────────────────────────────────────────────────────
# LOCAL PROFILE — development environment
# Postgres must be running locally (Docker recommended)
# ─────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: local

  datasource:
    # Local dev: xerial SQLite driver on a local file. Build the file from
    # db/migration/V1__init_schema.sql (+ optional Neon data) via the migration tooling.
    url: jdbc:sqlite:${SQLITE_DB_PATH:./data/portfolio_local.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1          # SQLite file allows a single writer — avoid "database is locked"
      connection-timeout: 30000
      connection-init-sql: "PRAGMA foreign_keys=ON"  # SQLite enforces FKs per-connection only

  jpa:
    show-sql: false  # set to true temporarily if debugging queries locally

logging:
  level:
    dev.chinh.portfolio: DEBUG

# JWT Configuration
jwt:
  issuer: https://api.portfolio-v2.com
  access-token-ttl-minutes: 15
  refresh-token-ttl-days: 7
  key-path: classpath:keys/private.pem

# Google OAuth2 Configuration
# Required env vars: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# Set real values for production; uses dummy for local development
spring.security.oauth2.client.registration.google.client-id: ${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.google.scope: profile,email
spring.security.oauth2.client.registration.google.redirect-uri: "{baseUrl}/login/oauth2/code/google"
spring.security.oauth2.client.provider.google.authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri: https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute: sub

# GitHub webhook configuration
github:
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET:dev-secret-for-testing}

# NLP / AI configuration
# NLP_PROXY_URL: Claude-compatible Messages API endpoint (default: local dev proxy)
# NLP_API_KEY: API key forwarded to proxy (empty string = no key for local dev proxy)
app:
  nlp:
    proxy-url: ${NLP_PROXY_URL:http://localhost:8081/v1/messages}
    api-key: ${NLP_API_KEY:}
    model: claude-haiku-4-5-20251001
    max-tokens: 500
    rate-limit-per-user: 20
    rate-limit-window-minutes: 60

---
# ─────────────────────────────────────────────────────────────
# PROD PROFILE — Google Cloud Run + Neon PostgreSQL
# ALL credentials MUST be environment variables — no defaults
# ─────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # SQLite file on a persistent Fly volume (mounted at /data). xerial driver — full
    # interactive-transaction support (Turso cloud over JDBC cannot do this with Hibernate).
    # WAL = concurrent readers; busy_timeout = wait out the single-writer lock; FK enforced.
    url: jdbc:sqlite:${SQLITE_DB_PATH:/data/portfolio.db}?journal_mode=WAL&busy_timeout=5000&foreign_keys=true
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 3        # SQLite WAL: many readers + one writer; keep modest
      minimum-idle: 1
      connection-timeout: 30000

server:
  # Cloud Run terminates TLS and forwards requests with X-Forwarded-* headers.
  forward-headers-strategy: FRAMEWORK

# GitHub webhook configuration - production requires secret
github:
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET:}

logging:
  level:
    dev.chinh.portfolio: INFO
    org.springframework: WARN

---
# ─────────────────────────────────────────────────────────────
# DEV PROFILE — development environment using Neon dev database
# ─────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # Turso (libSQL) dev database. Same driver as prod.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.dbeaver.jdbc.driver.libsql.LibSqlDriver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      connection-test-query: "SELECT 1"
      connection-init-sql: "PRAGMA foreign_keys=ON"

  jpa:
    show-sql: false

logging:
  level:
    dev.chinh.portfolio: DEBUG
