# Test configuration for MetricsAggregationIntegrationTest.
# Uses Testcontainers for PostgreSQL (via @ServiceConnection).
# WireMock stubs are configured programmatically per-test in MetricsAggregationIntegrationTest.java.
spring:
  config:
    # Point to test-classpath showcase-test.yml for deterministic test data
    import: optional:classpath:showcase-test.yml

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
